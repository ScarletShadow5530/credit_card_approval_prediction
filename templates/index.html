<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-predict { 
            grid-column: span 3; 
            padding: 15px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 20px;
        }
        .btn-predict:hover { background-color: #0056b3; }
        
        .result-box {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Credit Card Approval Prediction</h2>
    <form action="/predict" method="POST" class="form-grid">
        <div class="form-group"><label>GENDER</label><select name="gender"><option>F</option><option>M</option></select></div>
        <div class="form-group"><label>OWN CAR OR NOT</label><select name="car"><option>Y</option><option>N</option></select></div>
        <div class="form-group"><label>OWN REAL ESTATE</label><select name="realty"><option>Y</option><option>N</option></select></div>
        
        <div class="form-group"><label>TOTAL ANNUAL INCOME</label><input type="number" name="income" placeholder="50000" required></div>
        <div class="form-group"><label>TYPE OF INCOME</label><select name="income_type"><option>Pensioner</option><option>Working</option><option>Commercial associate</option><option>State servant</option></select></div>
        <div class="form-group"><label>EDUCATION</label><select name="education"><option>Higher education</option><option>Secondary / secondary special</option><option>Incomplete higher</option></select></div>
        
        <div class="form-group"><label>FAMILY STATUS</label><select name="family_status"><option>Married</option><option>Single / not married</option><option>Civil marriage</option></select></div>
        <div class="form-group"><label>TYPE OF HOUSING</label><select name="housing"><option>House / apartment</option><option>With parents</option><option>Municipal apartment</option></select></div>
        <div class="form-group"><label>FAMILY MEMBERS</label><input type="number" name="family_members" placeholder="2" required></div>
        
        <div class="form-group"><label>DAYS BIRTH (Negative)</label><input type="number" name="days_birth" placeholder="-12005" required></div>
        <div class="form-group"><label>DAYS EMPLOYED (Negative)</label><input type="number" name="days_employed" placeholder="-4542" required></div>
        <div></div>

        <button type="submit" class="btn-predict">Predict</button>
    </form>

    {% if prediction_text %}
        <div class="result-box">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>


</body>
</html>
